<section class="slide">
  <style>
    .slide {
      width: 1366px;
      min-height: 768px;
      margin: 0 auto;
      padding: 12px 20px 18px 20px;
      background: #000;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 10px;
    }

    .title-left {
      color: #ff3131;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .title-date {
      color: #ff4dd8;
      font-size: 22px;
      font-weight: 900;
    }

    table.grid {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #000;
      border: 1px solid #cfcfcf;
    }

    table.grid th,
    table.grid td {
      border: 1px solid #cfcfcf;
      padding: 8px 10px;
      vertical-align: middle;
      background: #000;
      line-height: 1.05;
    }

    thead th {
      color: #ff3131;
      font-size: 21px;
      font-weight: 900;
      text-align: center;
    }

    tbody td {
      color: #ffffff;
      font-size: 19px;
      font-weight: 800;
    }

    .c1 { width: 46%; text-align: left; }
    .c2 { width: 8%; }
    .c3, .c4, .c5, .c6 { width: 11.5%; }

    .center { text-align: center; }
    .num { text-align: right; }
    .empty { padding: 22px 10px; }

    .debug-row {
      color: #ffd966;
      font-size: 13px;
      font-weight: 700;
      text-align: left;
      padding: 10px 12px;
      line-height: 1.25;
    }
  </style>

  <div class="title-row">
    <div class="title-left">RAU</div>
    <div class="title-date"></div>
  </div>

  <table class="grid">
    <thead>
      <tr>
        <th class="c1">Tên</th>
        <th class="c2">ĐV</th>
        <th class="c3">Tổng</th>
        <th class="c4">Sáng</th>
        <th class="c5">Trưa</th>
        <th class="c6">Chiều</th>
      </tr>
    </thead>
    <tbody>
      
    <tr>
      <td colspan="6" class="center empty">Không có dữ liệu</td>
    </tr>
    <tr>
      <td colspan="6" class="debug-row">Nguồn: empty • Input: 0 • Output: 0</td>
    </tr>
  
    </tbody>
  </table>
</section>
