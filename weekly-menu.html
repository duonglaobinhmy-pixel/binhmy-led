<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1366, initial-scale=1" />
  <title>THỰC ĐƠN TUẦN 2</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 1366px;
      height: 768px;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    .slide-menu {
      width: 1366px;
      height: 768px;
      background: #000;
      box-sizing: border-box;
      overflow: hidden;
    }

    .menu-title {
      width: 684px;
      height: 64px;
      background: #00e85a;
      color: #ff1a00;
      font-size: 31px;
      font-weight: 900;
      line-height: 64px;
      padding-left: 10px;
      box-sizing: border-box;
      text-transform: uppercase;
    }

    .menu-grid {
      width: 100%;
      height: 704px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid #505050;
      border-left: 1px solid #505050;
      box-sizing: border-box;
    }

    .day-col {
      border-right: 1px solid #505050;
      display: grid;
      grid-template-rows: 110px 222px 372px;
      min-width: 0;
      box-sizing: border-box;
    }

    .day-head {
      border-bottom: 1px solid #505050;
      text-align: center;
      color: #ff2b00;
      font-weight: 900;
      box-sizing: border-box;
      padding-top: 16px;
    }

    .day-name {
      font-size: 25px;
      line-height: 30px;
      margin-bottom: 28px;
    }

    .day-date {
      font-size: 25px;
      line-height: 30px;
    }

    .meal-block {
      border-bottom: 1px solid #505050;
      box-sizing: border-box;
      padding: 14px 10px 8px 10px;
      overflow: hidden;
    }

    .meal-chieu {
      border-bottom: none;
    }

    .dish {
      font-size: 23px;
      line-height: 1.18;
      font-weight: 900;
      margin-bottom: 18px;
      letter-spacing: -0.2px;
      word-break: normal;
      overflow-wrap: break-word;
    }

    .dish.main {
      color: #00ff70;
    }

    .dish.white {
      color: #ffffff;
    }
  </style>
</head>

<body>
  <section class="slide-menu">
    <div class="menu-title">THỰC ĐƠN TUẦN 2</div>
    <div class="menu-grid">
      
    </div>
  </section>
</body>
</html>
