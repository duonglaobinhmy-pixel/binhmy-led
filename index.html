<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BẢNG LED BẾP</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      background: #edf2f7;
      font-family: Arial, Helvetica, sans-serif;
      color: #1f2937;
    }

    .deck {
      width: 100%;
    }

    .slide {
      width: 1280px;
      min-height: 720px;
      margin: 0 auto 28px auto;
      background: #ffffff;
      border: 1px solid #d8dee9;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 28px 32px;
      page-break-after: always;
      overflow: hidden;
    }

    .slide-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 3px solid #0b57d0;
    }

    .slide-title {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.2;
      color: #0f172a;
      margin-bottom: 6px;
      white-space: pre-line;
    }

    .slide-subtitle {
      font-size: 16px;
      color: #475569;
      white-space: pre-line;
    }

    .slide-no {
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 700;
      color: #0b57d0;
      background: #eaf2ff;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 8px 14px;
    }

    .cover {
      background: linear-gradient(135deg, #0b57d0 0%, #1f7ae0 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .cover-inner {
      width: 100%;
      max-width: 1000px;
    }

    .cover-badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.24);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .cover h1 {
      margin: 0 0 16px 0;
      font-size: 50px;
      line-height: 1.12;
      white-space: pre-line;
    }

    .cover-subtitle {
      font-size: 26px;
      opacity: 0.96;
      margin-bottom: 28px;
      white-space: pre-line;
    }

    .top-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      max-width: 1000px;
    }

    .top-meta-card {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 16px;
      padding: 14px 16px;
    }

    .top-meta-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0.86;
      margin-bottom: 8px;
    }

    .top-meta-value {
      font-size: 24px;
      font-weight: 700;
    }

    .table-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid #dbe4f0;
      margin-top: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      background: white;
    }

    thead th {
      background: #0b57d0;
      color: white;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 8px;
      border-right: 1px solid rgba(255,255,255,0.2);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    tbody td {
      font-size: 13px;
      padding: 8px 8px;
      border-top: 1px solid #e5eaf2;
      border-right: 1px solid #eef2f7;
      vertical-align: top;
      white-space: pre-line;
      word-break: break-word;
    }

    tbody tr:nth-child(even) td {
      background: #f8fbff;
    }

    table.compact thead th {
      font-size: 12px;
      padding: 8px 6px;
    }

    table.compact tbody td {
      font-size: 11px;
      padding: 6px 6px;
    }

    .agg-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 8px;
    }

    .agg-card {
      border: 1px solid #dbe4f0;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    .agg-head {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      gap: 16px;
      padding: 14px 16px;
      background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
      border-bottom: 1px solid #e5edf7;
    }

    .agg-left {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .agg-index {
      min-width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #0b57d0;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .agg-title {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }

    .agg-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eaf2ff;
      border: 1px solid #cfe0ff;
      color: #0b57d0;
      font-size: 12px;
      font-weight: 700;
    }

    .agg-right {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .metric {
      min-width: 150px;
      border: 1px solid #dbe4f0;
      border-radius: 12px;
      padding: 10px 12px;
      background: #ffffff;
    }

    .metric-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
    }

    .agg-meta {
      padding: 12px 16px 0 16px;
    }

    .agg-meta-item {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .meta-k {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
    }

    .meta-v {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
    }

    .subtable-wrap {
      margin: 0 16px 16px 16px;
      border: 1px solid #dbe4f0;
      border-radius: 12px;
      overflow: hidden;
    }

    .subtable {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
    }

    .subtable thead th {
      background: #1f7ae0;
      color: #fff;
      font-size: 12px;
      padding: 8px 8px;
      text-align: left;
    }

    .subtable tbody td {
      font-size: 12px;
      padding: 7px 8px;
      border-top: 1px solid #e8eef6;
      background: #fff;
    }

    .subtable tbody tr:nth-child(even) td {
      background: #f8fbff;
    }

    .sub-empty,
    .empty {
      margin-top: 12px;
      padding: 18px;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      color: #64748b;
      font-style: italic;
      background: #f8fafc;
    }

    .num {
      font-variant-numeric: tabular-nums;
      text-align: right;
      display: inline-block;
      min-width: 60px;
    }

    .warn-text {
      color: #b91c1c;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="deck">
    
  </div>
</body>
</html>
