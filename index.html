<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bảng LED Bình Mỹ</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }
    #app {
      width: 1366px;
      margin: 0 auto;
      background: #000;
    }
    .loading,
    .error {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #ddd;
      text-align: center;
      padding: 24px;
    }
    .error {
      color: #ff9d9d;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">Đang tải dữ liệu bảng LED...</div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
