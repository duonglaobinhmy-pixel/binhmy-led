
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BẢNG LED BẾP</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrap {
      width: 100%;
      padding: 12px;
    }
    .cover {
      min-height: 100vh;
      padding: 20px 24px;
      background: #000;
    }
    .cover h1 {
      margin: 0 0 8px;
      font-size: 42px;
      color: #9cff57;
      font-weight: 800;
      text-transform: uppercase;
    }
    .cover .date {
      font-size: 28px;
      color: #ff4d4f;
      font-weight: 800;
      margin-bottom: 18px;
    }
    .page {
      min-height: 100vh;
      padding: 12px 8px 20px;
      page-break-after: always;
      background: #000;
    }
    .page-title {
      color: #9cff57;
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      text-transform: uppercase;
      margin: 6px 0 14px;
    }
    .led-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      background: #000;
    }
    .led-table th,
    .led-table td {
      border: 1px solid #d9d9d9;
      padding: 6px 8px;
      text-align: center;
      vertical-align: middle;
      font-size: 18px;
      line-height: 1.2;
    }
    .led-table th {
      color: #ff4d4f;
      font-weight: 800;
      background: #000;
    }
    .led-table td {
      color: #fff;
      font-weight: 700;
    }
    .led-table td.dish {
      text-align: left;
      color: #fff;
      font-weight: 800;
    }
    .num.red { color: #ff4d4f; }
    .num.green { color: #9cff57; }
    .num.white { color: #fff; }
    .hide { display: none; }
  </style>
</head>
<body>
<div class="wrap">
  <section class="cover">
    <h1>BẢNG LED BẾP</h1>
    <div class="date">Ngày 2026-04-07</div>
  </section>



</div>
</body>
</html>
