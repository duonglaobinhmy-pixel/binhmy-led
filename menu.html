<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bảng khẩu phần ăn</title>
  <style>
    :root {
      --bg: #000000;
      --grid: rgba(255,255,255,0.55);
      --white: #ffffff;
      --green: #00f5a0;
      --pink: #ff3eea;
      --red: #ff3434;
      --yellow: #ffd83d;
      --cyan: #00ffd5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
    }

    .page {
      width: 100%;
      max-width: 1480px;
      margin: 0 auto;
      padding: 18px;
      background: #111;
    }

    .menu-section {
      background: var(--bg);
      border: 1px solid var(--grid);
      margin-bottom: 24px;
      padding: 10px 10px 14px;
    }

    .section-title {
      text-align: center;
      color: var(--green);
      font-weight: 900;
      font-size: 30px;
      line-height: 1.1;
      margin: 0 0 10px;
      text-transform: uppercase;
    }

    .led-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: var(--bg);
    }

    .led-table th,
    .led-table td {
      border: 1px solid var(--grid);
      padding: 8px 10px;
      vertical-align: middle;
      background: var(--bg);
    }

    .date-head {
      width: 220px;
      color: var(--pink);
      font-weight: 900;
      font-size: 32px;
      text-align: center;
      height: 58px;
    }

    .meal-head {
      color: var(--pink);
      font-weight: 900;
      font-size: 30px;
      text-align: right;
      padding-right: 16px;
      letter-spacing: 0.5px;
    }

    .menu-head,
    .total-head {
      color: var(--white);
      font-weight: 900;
      font-size: 26px;
      text-align: center;
    }

    .menu-head {
      width: 320px;
    }

    .total-head {
      width: 140px;
    }

    .col-khu {
      text-align: center;
      padding: 6px 6px 8px;
    }

    .khu-name {
      color: var(--red);
      font-weight: 900;
      font-size: 24px;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .khu-sub {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--white);
      font-weight: 800;
      font-size: 14px;
      opacity: 0.95;
    }

    .menu-name {
      color: var(--white);
      font-weight: 900;
      font-size: 22px;
      line-height: 1.15;
      text-transform: none;
      word-break: break-word;
    }

    .total-portions {
      color: var(--red);
      font-weight: 900;
      font-size: 22px;
      text-align: center;
    }

    .cell-left,
    .cell-right,
    .cell.empty {
      font-weight: 900;
      font-size: 18px;
      text-align: center;
      height: 56px;
    }

    .cell-left {
      color: var(--yellow);
      white-space: nowrap;
    }

    .cell-right {
      color: var(--white);
      white-space: nowrap;
    }

    .sl {
      color: var(--yellow);
      margin-right: 8px;
    }

    .noi {
      color: var(--cyan);
    }

    .empty {
      color: transparent;
    }

    @media (max-width: 1280px) {
      .section-title { font-size: 26px; }
      .date-head { font-size: 28px; }
      .meal-head { font-size: 26px; }
      .menu-head, .total-head { font-size: 22px; }
      .khu-name { font-size: 21px; }
      .menu-name { font-size: 20px; }
      .total-portions, .cell-left, .cell-right { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div style="color:white;padding:20px;background:black;">Không có dữ liệu để hiển thị.</div>
  </div>
</body>
</html>
