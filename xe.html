
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  
<style>
  .slide {
    width: 1366px;
    min-height: 768px;
    margin: 0 auto;
    background: #000;
    box-sizing: border-box;
    font-family: "Times New Roman", Georgia, serif;
    color: #fff;
    page-break-after: always;
    overflow: hidden;
    display: block;
  }

  .slide-main {
    padding: 18px 20px 14px 20px;
  }

  .main-title {
    text-align: center;
    color: #00ee88;
    font-size: 34px;
    line-height: 1.08;
    font-weight: 800;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .main-date {
    text-align: center;
    color: #ff39da;
    font-size: 28px;
    line-height: 1;
    font-weight: 800;
    margin-bottom: 2px;
  }

  .main-section {
    margin-top: 6px;
    margin-bottom: 6px;
  }

  .main-sec-head,
  .main-row {
    display: grid;
    grid-template-columns: 15% 27% 14% 14% 30%;
    column-gap: 0;
    align-items: baseline;
    width: 100%;
  }

  .main-sec-head {
    margin-top: 2px;
    margin-bottom: 2px;
  }

  .left-head {
    color: #ff39da;
    font-size: 30px;
    font-weight: 800;
    text-align: left;
    white-space: nowrap;
  }

  .col-head {
    font-size: 30px;
    font-weight: 800;
    line-height: 1.05;
    white-space: nowrap;
  }

  .red { color: #ff2020; }
  .green { color: #00ee88; }

  .ing-name {
    color: #ffffff;
    font-size: 28px;
    font-weight: 800;
    line-height: 1.08;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .qty {
    color: #ffffff;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.08;
    white-space: nowrap;
  }

  .center { text-align: center; }
  .right { text-align: right; }

  .empty-note {
    color: #ffffff;
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    margin-top: 120px;
  }
</style>

</head>
<body>
  <section class="slide">
    <div class="slide-main">
      <div class="main-title">BẢNG NGUYÊN LIỆU CHO MÓN XẾ</div>
      <div class="main-date">22/04/2026</div>

      <div class="main-section">
        <div class="main-sec-head">
          <div class="left-head">XẾ</div>
          <div class="col-head red center">NGUYÊN LIỆU</div>
          <div class="col-head red center">GÒ VẤP</div>
          <div class="col-head red center">BÌNH MỸ</div>
          <div class="col-head green right">Sữa ngũ cốc 3 vị</div>
        </div>

        
          <div class="main-row">
            <div></div>
            <div class="ing-name">Khoai môn cao thô</div>
            <div class="qty center">3,0</div>
            <div class="qty center">3,0</div>
            <div class="qty right">6,0</div>
          </div>
        
          <div class="main-row">
            <div></div>
            <div class="ing-name">nước</div>
            <div class="qty center">30,0</div>
            <div class="qty center">30,0</div>
            <div class="qty right">60,0</div>
          </div>
        
          <div class="main-row">
            <div></div>
            <div class="ing-name">Đường</div>
            <div class="qty center">1,2</div>
            <div class="qty center">1,2</div>
            <div class="qty right">2,4</div>
          </div>
        
          <div class="main-row">
            <div></div>
            <div class="ing-name">Muối</div>
            <div class="qty center">0,02</div>
            <div class="qty center">0,02</div>
            <div class="qty right">0,04</div>
          </div>
        
          <div class="main-row">
            <div></div>
            <div class="ing-name">Gừng</div>
            <div class="qty center">0,1</div>
            <div class="qty center">0,1</div>
            <div class="qty right">0,2</div>
          </div>
        
          <div class="main-row">
            <div></div>
            <div class="ing-name">Bơ hạt điều</div>
            <div class="qty center">1,5</div>
            <div class="qty center">1,5</div>
            <div class="qty right">3,0</div>
          </div>
        
      </div>
    </div>
  </section>
</body>
</html>
