<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>xe.html</title>
<style>
  body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:"Times New Roman", serif;
  }
  .page{
    width:1920px;
    min-height:1080px;
    padding:24px 32px 40px;
    box-sizing:border-box;
    background:#000;
  }
  .title{
    text-align:center;
    color:#00f7b2;
    font-size:58px;
    font-weight:900;
    text-transform:uppercase;
    line-height:1.05;
    margin-bottom:16px;
  }
  .date{
    color:#ff40f5;
    font-size:46px;
    font-weight:900;
    margin:8px 0 18px;
    text-align:center;
  }
  .ingredient-title{
    color:#00f7b2;
    font-size:44px;
    font-weight:900;
    text-align:center;
    text-transform:uppercase;
    margin:34px 0 10px;
  }
  .section-wrap{
    margin-top:30px;
  }
  .buoi-label{
    color:#ff40f5;
    font-size:42px;
    font-weight:900;
    text-transform:uppercase;
    margin:12px 0 8px;
  }
  .header-row{
    display:grid;
    grid-template-columns: 1.5fr 0.8fr 0.8fr 0.9fr;
    gap:0;
    margin-top:10px;
    margin-bottom:4px;
    align-items:end;
  }
  .header-row .h{
    color:#ff2f2f;
    font-size:34px;
    font-weight:900;
    text-align:center;
    text-transform:uppercase;
  }
  .group-title{
    color:#00f7b2;
    font-size:30px;
    font-weight:900;
    text-align:right;
    margin:4px 0 8px;
  }
  .ingredient-grid{
    width:100%;
    display:grid;
    grid-template-columns: 1.5fr 0.8fr 0.8fr 0.9fr;
    row-gap:8px;
    align-items:start;
  }
  .ingredient-grid .cell{
    font-size:30px;
    font-weight:800;
    text-align:center;
  }
  .ingredient-grid .name{
    text-align:left;
    padding-left:10px;
  }
  .ingredient-grid .total-val{
    font-size:30px;
    font-weight:900;
    text-align:right;
    padding-right:18px;
  }
</style>
</head>
<body>
<div class="page">
  <div class="title">BẢNG NGUYÊN LIỆU CHO MÓN XẾ</div>
  <div class="date">23-04-26</div>

  <div class="section-wrap">
    <div class="buoi-label">XẾ</div>

    <div class="header-row">
      <div class="h">NGUYÊN LIỆU</div>
      <div class="h">GÒ VẤP</div>
      <div class="h">BÌNH MỸ</div>
      <div class="group-title">Sữa ngũ cốc 3 vị</div>
    </div>

    <div class="ingredient-grid">
      <div class="cell name">Bơ hạt điều</div>
      <div class="cell">6,0</div>
      <div class="cell">9,0</div>
      <div class="total-val">15,0</div>

      <div class="cell name">Đường</div>
      <div class="cell">4,8</div>
      <div class="cell">7,2</div>
      <div class="total-val">12,0</div>

      <div class="cell name">Gừng</div>
      <div class="cell">0,4</div>
      <div class="cell">0,6</div>
      <div class="total-val">1,0</div>

      <div class="cell name">Khoai môn cao thô</div>
      <div class="cell">12,0</div>
      <div class="cell">18,0</div>
      <div class="total-val">30,0</div>

      <div class="cell name">Muối</div>
      <div class="cell">0,08</div>
      <div class="cell">0,12</div>
      <div class="total-val">0,2</div>

      <div class="cell name">nước</div>
      <div class="cell">108,0</div>
      <div class="cell">162,0</div>
      <div class="total-val">270,0</div>
    </div>
  </div>
</div>
</body>
</html>
